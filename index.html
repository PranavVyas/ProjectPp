<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive India Map with Hints</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* --- Main Wrapper --- */
        .main-wrapper {
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 600px; 
            margin: auto; 
        }

        /* --- Hints Container --- */
        .hints-panel {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%; 
            box-sizing: border-box;
        }

        .hints-panel h2 {
            margin-top: 0;
            color: #2f3542;
            text-align: center;
            border-bottom: 2px solid #f1f2f6;
            padding-bottom: 15px;
        }

        .hint-card {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #ff4757; 
            font-size: 0.95rem;
            color: #2f3542;
            line-height: 1.5;
            font-style: italic;
        }

        /* --- Map Container --- */
        .map-container {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 500px; 
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .external-img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            pointer-events: none; 
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.1));
        }

        /* --- Reusable City Zone Class --- */
        .city-zone {
            position: absolute;
            width: 26px; 
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Coordinates & Colors */
        #zone-goa { top: 69%; left: 21%; --city-color: #2ecc71; }
        #zone-nagpur { top: 53%; left: 41%; --city-color: #e67e22; }
        #zone-surat { top: 53%; left: 18%; --city-color: #3498db; }
        #zone-kosamba { top: 50%; left: 19%; --city-color: #9b59b6; }
        #zone-bhavnagar { top: 50%; left: 14%; --city-color: #f1c40f; }
        #zone-junagadh { top: 51.5%; left: 10%; --city-color: #e74c3c; }
        #zone-surendranagar { top: 47.5%; left: 15%; --city-color: #1abc9c; }

        .city-dot {
            width: 8px;
            height: 8px;
            background-color: var(--city-color);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 0 10px var(--city-color); 
        }

        .secret-btn {
            position: absolute;
            display: none;
            background: var(--city-color); 
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            white-space: nowrap;
            transform: translateX(50px); 
            animation: fadeIn 0.2s ease-out;
        }

        .secret-btn:hover { filter: brightness(90%); }
        .city-zone:hover .city-dot { opacity: 1; }
        .city-zone:hover .secret-btn { display: block; }

        /* --- Responsive Dialog Box --- */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 15px;
            box-sizing: border-box;
        }

        .dialog-card {
            background: white;
            padding: 30px 20px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 320px;
            max-height: 90vh;
            overflow-y: auto;
            animation: popIn 0.3s forwards;
            box-sizing: border-box;
        }

        #city-name-title {
            color: #7f8fa6;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .thought-bubble {
            background: #f1f2f6;
            padding: 20px 25px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #2f3542;
            margin-bottom: 25px;
            position: relative;
            border: 2px solid #dfe4ea;
            display: inline-block;
            line-height: 1.4;
        }

        .thought-bubble::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 16px solid #dfe4ea;
        }

        /* --- UPDATED: Strict Circular Image Styling --- */
        .image-frame {
            width: 150px; /* Outer frame size */
            height: 282px;
            overflow: hidden; /* STRICTLY cuts off anything outside the circle */
            margin: 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f1f2f6; /* Placeholder color while loading */
        }

        .city-image {
            width: 100%; /* Image fills frame width */
            height: 100%; /* Image fills frame height */
            object-fit: cover; /* Recrops portrait images to fit square center */
            display: block;
        }

        .close-btn {
            margin-top: 20px;
            background: #2f3542;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .close-btn:hover { background: #1e242c; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.9); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="hints-panel">
            <h2>🕵️ Can you find these places?</h2>
	    <h4> Answer to following question leads to a place in a map, click on the map for special message from the person😉 !!</h4>
            <div id="hints-list"></div>
        </div>

        <div class="map-container" id="map-area">
            <img src="india.png" alt="India Map" class="external-img">
            
            <div class="city-zone" id="zone-goa">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('goa')">Found Goa!</button>
            </div>
            <div class="city-zone" id="zone-nagpur">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('nagpur')">Found Nagpur!</button>
            </div>
            <div class="city-zone" id="zone-surat">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('surat')">Found Surat!</button>
            </div>
            <div class="city-zone" id="zone-kosamba">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('kosamba')">Found Kosamba!</button>
            </div>
            <div class="city-zone" id="zone-bhavnagar">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('bhavnagar')">Found Bhavnagar!</button>
            </div>
            <div class="city-zone" id="zone-junagadh">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('junagadh')">Found Junagadh!</button>
            </div>
            <div class="city-zone" id="zone-surendranagar">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('surendranagar')">Found Surendranagar!</button>
            </div>
        </div>

    </div>

    <div id="modal-overlay">
        <div class="dialog-card">
            <div id="city-name-title">City Name</div>
            <div class="thought-bubble" id="dialog-message">Message</div>
            
            <div class="image-frame">
                <img id="dialog-image" src="" alt="City Image" class="city-image">
            </div>
            
            <br>
            <button class="close-btn" onclick="closeDialog()">Close</button>
        </div>
    </div>

    <script>
        // Data Object
        const cityData = {
            "goa": {
                "name": "Goa",
                "message": "May you receive all love and respect you deserve, and may you continue to excel in your career",
                "hint": "Naam he mera similar, confusion to hoga,\nGayi thi me sirf ghumne ke liye ____"
            },
            "surat": {
                "name": "Surat",
                "message": "Wishing you all the best for your future, Many success and happiness follows you wherever you go, You will be truely missed, Stay in touch",
                "hint": "Aksar Sneha jode levay che maru naam,\nGaalo devano che amaro janm siddh adhikar,\nBolo from where am I, yaar?"
            },
            "nagpur": {
                "name": "Nagpur",
                "message": "May happiness be your best friend and best of luck for future, my first friend in grasim",
                "hint": "Height he meri choti,\nBaate karu me uchi uchi,\nBaki sab ko bulaya tha yhi,\nKhane mene biriyani Tikhi Tikhi!"
            },
            "junagadh": {
                "name": "Junagadh",
                "message": "May your next chapter be as distuinguished as your contribution here",
                "hint": "Bhale baki sab kare parti varti,\nEk pizza slice khake bhukh mite hamari,\nBolo he mera ghar kaha, Jaani?"
            },
            "bhavnagar": {
                "name": "Bhavnagar",
                "message": "I wish you all the joy you can imagine, I have truley admired your friendly nature, your wit and your incridible ability to connect with people, Your humbleness has always stood out to me, Stay happy and healty, and I wish you nothing but best for your future advanture. ",
                "hint": "Pela Hiroshima, pachi nagasaki,\nKhatarnak che ana thi pan vadhare, Short speech amari,\nKyathi chu hu, kaho ji Marwadi?"
            },
            "kosamba": {
                "name": "Kosamba",
                "message": "Wishing you success on your new journey, stay amazing",
                "hint": "Aag ma nani chingari nakhi, me karu joya,\nDar Saturday hu bhagi jau chu bhagi _____."
            },
            "surendranagar": {
                "name": "Surendranagar",
                "message": "Wishing you to be healthier and happier than yesterday, everyday! Best of luck for your future endavors",
                "hint": "Handsome, Smart and Dashing, Bandh karo have tarif mari.\nIndia ni peli Soda Ash ni factory jya lagi,\nTe location janavo amari"
            }
        };

        const hintsList = document.getElementById('hints-list');
        const colors = ['#2ecc71', '#e67e22', '#3498db', '#9b59b6', '#f1c40f', '#e74c3c', '#1abc9c'];
        let colorIndex = 0;

        for (const cityKey in cityData) {
            const city = cityData[cityKey];
            const hintDiv = document.createElement('div');
            hintDiv.className = 'hint-card';
            hintDiv.style.borderLeftColor = colors[colorIndex % colors.length];
            hintDiv.innerText = "❝ " + city.hint + " ❞";
            hintsList.appendChild(hintDiv);
            colorIndex++;
        }

        function openDialog(cityId) { 
            if (!cityData[cityId]) return;

            const data = cityData[cityId];
            document.getElementById('city-name-title').innerText = "📍 " + data.name;
            document.getElementById('dialog-message').innerText = data.message;
            
            // Set the image source dynamically based on the cityId clicked
            document.getElementById('dialog-image').src = cityId + ".png";
            
            document.getElementById('modal-overlay').style.display = 'flex'; 
        }

        function closeDialog() { 
            document.getElementById('modal-overlay').style.display = 'none'; 
            // Clear the image source on close so the old image doesn't flash next time it opens
            setTimeout(() => { document.getElementById('dialog-image').src = ""; }, 300);
        }

        </script>
</body>
</html>
