<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Color Interactive India Map</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .map-container {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 500px; 
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .external-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ensures the PNG fits well inside the box */
            pointer-events: none; 
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.1));
        }

        /* --- Reusable City Zone Class --- */
        .city-zone {
            position: absolute;
            width: 26px; 
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* --- Specific City Coordinates & UNIQUE COLORS --- */
        /* TIP: If the dots don't align perfectly with your PNG, tweak these top/left percentages! */
        #zone-goa { 
            top: 67%; left: 27%; 
            --city-color: #2ecc71; 
        }
        #zone-nagpur { 
            top: 48%; left: 43%; 
            --city-color: #e67e22; 
        }
        #zone-surat { 
            top: 49%; left: 20%; 
            --city-color: #3498db; 
        }
        #zone-kosamba { 
            top: 47.5%; left: 20.5%; 
            --city-color: #9b59b6; 
        }
        #zone-bhavnagar { 
            top: 46%; left: 18%; 
            --city-color: #f1c40f; 
        }
        #zone-junagadh { 
            top: 46.5%; left: 13%; 
            --city-color: #e74c3c; 
        }
        #zone-surendranagar { 
            top: 43%; left: 16%; 
            --city-color: #1abc9c; 
        }

        /* --- The Dot (Inherits the unique color) --- */
        .city-dot {
            width: 8px;
            height: 8px;
            background-color: var(--city-color);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 0 10px var(--city-color); 
        }

        /* --- The Reveal Button (Inherits the unique color) --- */
        .secret-btn {
            position: absolute;
            display: none;
            background: var(--city-color); 
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            white-space: nowrap;
            transform: translateX(50px); 
            animation: fadeIn 0.2s ease-out;
        }

        .secret-btn:hover {
            filter: brightness(90%);
        }

        /* Hover Actions */
        .city-zone:hover .city-dot { opacity: 1; }
        .city-zone:hover .secret-btn { display: block; }

        /* --- Dialog Box --- */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .dialog-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            min-width: 300px;
            animation: popIn 0.3s forwards;
        }

        #city-name-title {
            color: #7f8fa6;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .thought-bubble {
            background: #f1f2f6;
            padding: 20px 25px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2f3542;
            margin-bottom: 25px;
            position: relative;
            border: 2px solid #dfe4ea;
            display: inline-block;
        }

        .thought-bubble::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 16px solid #dfe4ea;
        }

        .avatar {
            font-size: 75px;
            display: block;
            margin-top: 10px;
        }

        .close-btn {
            margin-top: 30px;
            background: #2f3542;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .close-btn:hover { background: #1e242c; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.9); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="map-container" id="map-area">
        <img src="india.png" alt="Accurate India Map" class="external-img">
        
        <div class="city-zone" id="zone-goa">
            <div class="city-dot"></div>
            <button class="secret-btn" onclick="openDialog('Goa', '🌴')">Found Goa!</button>
        </div>

        <div class="city-zone" id="zone-nagpur">
            <div class="city-dot"></div>
            <button class="secret-btn" onclick="openDialog('Nagpur', '🍊')">Found Nagpur!</button>
        </div>

        <div class="city-zone" id="zone-surat">
            <div class="city-dot"></div>
            <button class="secret-btn" onclick="openDialog('Surat', '💎')">Found Surat!</button>
        </div>

        <div class="city-zone" id="zone-kosamba">
            <div class="city-dot"></div>
            <button class="secret-btn" onclick="openDialog('Kosamba', '🏭')">Found Kosamba!</button>
        </div>

        <div class="city-zone" id="zone-bhavnagar">
            <div class="city-dot"></div>
            <button class="secret-btn" onclick="openDialog('Bhavnagar', '🚢')">Found Bhavnagar!</button>
        </div>

        <div class="city-zone" id="zone-junagadh">
            <div class="city-dot"></div>
            <button class="secret-btn" onclick="openDialog('Junagadh', '🦁')">Found Junagadh!</button>
        </div>

        <div class="city-zone" id="zone-surendranagar">
            <div class="city-dot"></div>
            <button class="secret-btn" onclick="openDialog('Surendranagar', '🌾')">Found Surendranagar!</button>
        </div>

    </div>

    <div id="modal-overlay">
        <div class="dialog-card">
            <div id="city-name-title">City Name</div>
            <div class="thought-bubble">
                Best of luck for future
            </div>
            <div class="avatar" id="dialog-avatar">👨‍🎓</div>
            <br>
            <button class="close-btn" onclick="closeDialog()">Close</button>
        </div>
    </div>

    <script>
        // Dynamic Dialog Logic
        function openDialog(cityName, emoji) { 
            document.getElementById('city-name-title').innerText = "📍 " + cityName;
            document.getElementById('dialog-avatar').innerText = emoji;
            document.getElementById('modal-overlay').style.display = 'flex'; 
        }

        function closeDialog() { 
            document.getElementById('modal-overlay').style.display = 'none'; 
        }

        window.onclick = function(event) {
            let overlay = document.getElementById('modal-overlay');
            if (event.target === overlay) closeDialog();
        }
    </script>
</body>
</html>
