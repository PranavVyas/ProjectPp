<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive India Map with Hints</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* --- Main Wrapper --- */
        .main-wrapper {
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 600px; 
            margin: auto; 
        }

        /* --- Hints Container (Now on top) --- */
        .hints-panel {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%; 
            box-sizing: border-box;
        }

        .hints-panel h2 {
            margin-top: 0;
            color: #2f3542;
            text-align: center;
            border-bottom: 2px solid #f1f2f6;
            padding-bottom: 15px;
        }

        .hint-card {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #ff4757; 
            font-size: 0.95rem;
            color: #2f3542;
            line-height: 1.5;
            font-style: italic;
        }

        /* --- Map Container (Now on bottom) --- */
        .map-container {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 500px; 
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .external-img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            pointer-events: none; 
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.1));
        }

        /* --- Reusable City Zone Class --- */
        .city-zone {
            position: absolute;
            width: 26px; 
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Coordinates & Colors */
        #zone-goa { top: 67%; left: 27%; --city-color: #2ecc71; }
        #zone-nagpur { top: 48%; left: 43%; --city-color: #e67e22; }
        #zone-surat { top: 49%; left: 20%; --city-color: #3498db; }
        #zone-kosamba { top: 47.5%; left: 20.5%; --city-color: #9b59b6; }
        #zone-bhavnagar { top: 46%; left: 18%; --city-color: #f1c40f; }
        #zone-junagadh { top: 46.5%; left: 13%; --city-color: #e74c3c; }
        #zone-surendranagar { top: 43%; left: 16%; --city-color: #1abc9c; }

        .city-dot {
            width: 8px;
            height: 8px;
            background-color: var(--city-color);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 0 10px var(--city-color); 
        }

        .secret-btn {
            position: absolute;
            display: none;
            background: var(--city-color); 
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            white-space: nowrap;
            transform: translateX(50px); 
            animation: fadeIn 0.2s ease-out;
        }

        .secret-btn:hover { filter: brightness(90%); }
        .city-zone:hover .city-dot { opacity: 1; }
        .city-zone:hover .secret-btn { display: block; }

        /* --- Responsive Dialog Box --- */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 15px;
            box-sizing: border-box;
        }

        .dialog-card {
            background: white;
            padding: 30px 20px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 320px;
            max-height: 90vh;
            overflow-y: auto;
            animation: popIn 0.3s forwards;
            box-sizing: border-box;
        }

        #city-name-title {
            color: #7f8fa6;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .thought-bubble {
            background: #f1f2f6;
            padding: 20px 25px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #2f3542;
            margin-bottom: 25px;
            position: relative;
            border: 2px solid #dfe4ea;
            display: inline-block;
            line-height: 1.4;
        }

        .thought-bubble::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 16px solid #dfe4ea;
        }

        /* Image Styling */
        .city-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            margin: 10px auto;
            display: block;
            border: 4px solid #f1f2f6;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .close-btn {
            margin-top: 20px;
            background: #2f3542;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .close-btn:hover { background: #1e242c; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.9); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="hints-panel">
            <h2>🕵️ Can you find these places?</h2>
            <div id="hints-list"></div>
        </div>

        <div class="map-container" id="map-area">
            <img src="india.png" alt="India Map" class="external-img">
            
            <div class="city-zone" id="zone-goa">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('goa')">Found Goa!</button>
            </div>
            <div class="city-zone" id="zone-nagpur">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('nagpur')">Found Nagpur!</button>
            </div>
            <div class="city-zone" id="zone-surat">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('surat')">Found Surat!</button>
            </div>
            <div class="city-zone" id="zone-kosamba">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('kosamba')">Found Kosamba!</button>
            </div>
            <div class="city-zone" id="zone-bhavnagar">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('bhavnagar')">Found Bhavnagar!</button>
            </div>
            <div class="city-zone" id="zone-junagadh">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('junagadh')">Found Junagadh!</button>
            </div>
            <div class="city-zone" id="zone-surendranagar">
                <div class="city-dot"></div>
                <button class="secret-btn" onclick="openDialog('surendranagar')">Found Surendranagar!</button>
            </div>
        </div>

    </div>

    <div id="modal-overlay">
        <div class="dialog-card">
            <div id="city-name-title">City Name</div>
            <div class="thought-bubble" id="dialog-message">Message</div>
            
            <img id="dialog-image" src="" alt="City Image" class="city-image">
            
            <br>
            <button class="close-btn" onclick="closeDialog()">Close</button>
        </div>
    </div>

    <script>
        // Updated Data with the specific messages
        const cityData = {
            "goa": {
                "name": "Goa",
                "message": "Mayuri message",
                "hint": "(1) Naam he mera similar, confusion to hoga, Gayi thi me sirf ghumne ke liye ____"
            },
            "surat": {
                "name": "Surat",
                "message": "Tushar message",
                "hint": "(2) Aksar Sneha jode levay che maru naam, Gaalo devano che amaro janm siddh adhikar, Bolo from where am I, yaar?"
            },
            "nagpur": {
                "name": "Nagpur",
                "message": "Nagpur message",
                "hint": "(3) Height he meri choti, Baate karu me uchi uchi, Baki sab ko bulaya tha yhi, Khane mene biriyani Tikhi Tikhi! Bhale baki sab kare parti varti, Ek pizza slice khake bhukh mite hamari, Bolo he mera ghar kaha, Jaani?"
            },
            "junagadh": {
                "name": "Junagadh",
                "message": "Chintan",
                "hint": "Pela Hiroshima, pachi nagasaki, Khatarnak che ana thi pan vadhare, Short speech amari, Kyathi chu hu, kaho Marwadi?"
            },
            "bhavnagar": {
                "name": "Bhavnagar",
                "message": "Harshil",
                "hint": "Aag ma nani chingari nakhi, me karu joya, Dar Saturday hu bhagi jau chu bhagi _____."
            },
            "kosamba": {
                "name": "Kosamba",
                "message": "Jignasa",
                "hint": "Handsome, Smart and Dashing, Bandh karo have tarif mari. India ni peli Soda Ashi factory jya lagi, E jagya nu naam ko to."
            },
            "surendranagar": {
                "name": "Surendranagar",
                "message": "Pranav",
                "hint": "Mari mate koi khas hint aapi nathi, pan hu Gujarat no ek jillo chu, shodhine batao!"
            }
        };

        const hintsList = document.getElementById('hints-list');
        const colors = ['#2ecc71', '#e67e22', '#3498db', '#9b59b6', '#f1c40f', '#e74c3c', '#1abc9c'];
        let colorIndex = 0;

        for (const cityKey in cityData) {
            const city = cityData[cityKey];
            const hintDiv = document.createElement('div');
            hintDiv.className = 'hint-card';
            hintDiv.style.borderLeftColor = colors[colorIndex % colors.length];
            hintDiv.innerText = "❝ " + city.hint + " ❞";
            hintsList.appendChild(hintDiv);
            colorIndex++;
        }

        function openDialog(cityId) { 
            if (!cityData[cityId]) return;

            const data = cityData[cityId];
            document.getElementById('city-name-title').innerText = "📍 " + data.name;
            document.getElementById('dialog-message').innerText = data.message;
            
            // Set the image source dynamically based on the cityId clicked
            document.getElementById('dialog-image').src = cityId + ".jpg";
            
            document.getElementById('modal-overlay').style.display = 'flex'; 
        }

        function closeDialog() { 
            document.getElementById('modal-overlay').style.display = 'none'; 
            // Clear the image source on close so the old image doesn't flash next time it opens
            setTimeout(() => { document.getElementById('dialog-image').src = ""; }, 300);
        }

        window.onclick = function(event) {
            let overlay = document.getElementById('modal-overlay');
            if (event.target === overlay) closeDialog();
        }
    </script>
</body>
</html>
